<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SHINX NC Viewer</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>SHINX NC Viewer</h1>
        <p>Fusion SHINX専用ポスト出力NCの確認ビューア</p>
      </div>
      <div class="actions">
        <span id="analysisStatus" class="status-pill">待機中</span>
        <button id="analyzeBtn">解析</button>
        <button id="jsonBtn" disabled>JSON</button>
        <button id="coordCsvBtn" disabled>座標CSV</button>
        <button id="checkCsvBtn" disabled>チェックCSV</button>
      </div>
    </header>

    <main class="viewer-layout">
      <aside class="side-panel">
        <section>
          <h2>設定</h2>
          <label>加工面<select id="machiningFace"></select></label>
          <div class="grid2">
            <label>材料厚<input id="materialThickness" type="number" step="0.001" /></label>
            <label>安全余裕<input id="safeClearance" type="number" step="0.001" /></label>
            <label>接近余裕<input id="approachClearance" type="number" step="0.001" /></label>
            <label>許容突抜<input id="allowOvercut" type="number" step="0.001" /></label>
            <label>材料X<input id="materialX" type="number" step="0.001" /></label>
            <label>材料Y<input id="materialY" type="number" step="0.001" /></label>
            <label>機械原点X<input id="machineOriginX" type="number" step="0.001" /></label>
            <label>機械原点Y<input id="machineOriginY" type="number" step="0.001" /></label>
          </div>
        </section>

        <section>
          <h2>Z基準</h2>
          <div id="zSummary" class="metric-list"></div>
        </section>

        <section>
          <h2>安全チェック</h2>
          <div id="checkSummary" class="check-summary"></div>
          <div id="checkList" class="check-list"></div>
        </section>

        <section>
          <h2>工具</h2>
          <div id="toolList" class="tool-list"></div>
        </section>
      </aside>

      <section class="code-panel">
        <div id="dropZone" class="dropzone">
          <strong>SHINX NCをドロップ</strong>
          <span>.nc / .txt を読み込み、または下へ貼り付け</span>
          <input id="fileInput" type="file" accept=".nc,.txt,.tap,.gcode,text/plain" />
        </div>
        <textarea id="ncInput" spellcheck="false" placeholder="FusionのSHINX専用ポストから出力したNCコードを貼り付け"></textarea>
      </section>

      <section class="table-panel">
        <div class="panel-head">
          <h2>座標一覧</h2>
          <span id="lineCount">0 行</span>
        </div>
        <div class="table-wrap">
          <table id="coordTable">
            <thead>
              <tr>
                <th>行</th>
                <th>元NC行</th>
                <th>G</th>
                <th>Mode</th>
                <th>X</th>
                <th>Y</th>
                <th>Z</th>
                <th>F</th>
                <th>S</th>
                <th>T</th>
                <th>工具</th>
                <th>警告</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="preview-panel">
        <div class="panel-head">
          <h2>2D XYプレビュー</h2>
          <div class="panel-tools">
            <button id="fitMaterialBtn" class="tool-btn active" type="button">材料全体</button>
            <button id="fitWorkBtn" class="tool-btn" type="button">加工範囲</button>
            <span id="rangeSummary"></span>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="xyCanvas" width="900" height="420"></canvas>
          <div id="xyTooltip" class="canvas-tooltip" hidden></div>
        </div>
        <div class="legend">
          <span><i class="legend-material"></i>材料外形</span>
          <span><i class="legend-range"></i>加工範囲</span>
          <span><i class="legend-rapid"></i>G00 早送り</span>
          <span><i class="legend-cut"></i>G01 切削</span>
          <span><i class="legend-arc"></i>G02/G03 円弧</span>
          <span><i class="legend-origin"></i>原点</span>
          <span><i class="legend-start"></i>開始点</span>
          <span><i class="legend-end"></i>終了点</span>
          <span><i class="legend-tool"></i>工具交換</span>
        </div>
      </section>

      <section class="z-panel">
        <div class="panel-head">
          <h2>Zビュー</h2>
          <span id="zRangeSummary"></span>
        </div>
        <div class="canvas-wrap">
          <canvas id="zCanvas" width="900" height="220"></canvas>
          <div id="zTooltip" class="canvas-tooltip" hidden></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
