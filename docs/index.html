<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SHINX Motion Viewer</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>SHINX Motion Viewer</h1>
        <p>SHINX 20ZXGN NC Simulator</p>
      </div>

      <div id="fileDrop" class="file-drop">
        <button id="filePickBtn" type="button">NC読込</button>
        <span id="fileNameLabel">ドロップ可</span>
        <input id="fileInput" type="file" accept=".nc,.txt,.tap,.gcode,text/plain" />
      </div>

      <div class="transport">
        <button id="playBtn" title="再生">▶</button>
        <button id="pauseBtn" title="一時停止">⏸</button>
        <button id="stopBtn" title="停止">■</button>
        <button id="prevBtn" title="1行戻る"><<</button>
        <button id="nextBtn" title="1行送り">>></button>
        <select id="speedSelect" title="再生速度">
          <option value="1" selected>1×</option>
          <option value="5">5×</option>
          <option value="10">10×</option>
          <option value="50">50×</option>
          <option value="100">100×</option>
          <option value="500">500×</option>
          <option value="1000">1000×</option>
          <option value="max">MAX</option>
        </select>
      </div>

      <div class="jumpbar">
        <button id="jumpStartBtn" title="最初の加工開始へ">加工開始</button>
        <button id="jumpToolBtn" title="次の工具交換へ">工具交換</button>
        <button id="jumpWarnBtn" title="次の警告へ">警告</button>
        <button id="jumpMinZBtn" title="最深Zへ">最深Z</button>
        <button id="jumpEndBtn" title="最後へ">最後</button>
      </div>

      <div class="perfbar">
        <button id="fieldModeBtn" class="mini active" title="現場モード">現場</button>
        <button id="detailModeBtn" class="mini" title="詳細モード">詳細</button>
        <label><input id="smoothModeToggle" type="checkbox" checked />滑らか</label>
        <label><input id="lightModeToggle" type="checkbox" />軽量再生</label>
        <select id="qualitySelect" title="プレビュー品質">
          <option value="high">高品質</option>
          <option value="standard" selected>標準</option>
          <option value="light">軽量</option>
        </select>
        <span id="profileLabel">FPS -- / draw --ms</span>
      </div>

      <div class="now-line">
        <span>現在行</span>
        <strong id="currentLineLabel">----</strong>
        <em id="blockCountLabel">0 blocks / 0 lines</em>
      </div>
    </header>

    <main id="motionLayout" class="motion-layout">
      <section class="xy-main-panel">
        <div class="panel-title">
          <h2>XY Motion</h2>
          <div id="viewerStatus" class="status">NC未読込</div>
          <div class="toggle-group">
            <button id="xyMaterialBtn" class="mini">材料全体</button>
            <button id="xyWorkBtn" class="mini active">加工範囲</button>
            <button id="xyFullscreenBtn" class="mini" title="XY Motionだけ全画面">全画面</button>
          </div>
        </div>
        <canvas id="xyCanvas" width="1100" height="680"></canvas>
        <div class="hud">
          <div><span>X</span><strong id="hudX">0.000</strong></div>
          <div><span>Y</span><strong id="hudY">0.000</strong></div>
          <div><span>Z</span><strong id="hudZ">0.000</strong></div>
          <div><span>F</span><strong id="hudF">-</strong></div>
          <div><span>S</span><strong id="hudS">-</strong></div>
          <div><span>T</span><strong id="hudT">-</strong></div>
        </div>
      </section>

      <div id="sideResizer" class="side-resizer" title="ドラッグで右パネル幅を変更"></div>

      <aside class="right-panel">
        <section class="section-panel">
          <div class="section-head">
            <h2>断面 Z</h2>
            <button id="toggleZBtn" class="mini">非表示</button>
          </div>
          <div class="canvas-box">
            <canvas id="sectionCanvas" width="360" height="320"></canvas>
          </div>
        </section>

        <section class="summary-panel">
          <h2>自動判定</h2>
          <div id="summaryGrid" class="summary-grid"></div>
        </section>

        <section class="safety-panel">
          <h2>安全チェック</h2>
          <div id="safetyState" class="safety-state ok">正常</div>
          <div id="safetyList" class="safety-list"></div>
        </section>
      </aside>

      <div id="bottomResizer" class="bottom-resizer" title="ドラッグでNC表示高さを変更"></div>

      <section class="bottom-panel">
        <div class="timeline-wrap">
          <input id="timeline" type="range" min="0" max="0" value="0" />
          <span id="timeLabel">00:00 / 00:00</span>
          <span id="bottomCountLabel">0 motion blocks / 0 NC lines</span>
          <button id="toggleNcBtn" class="mini">NC非表示</button>
        </div>
        <div class="nc-area">
          <textarea id="ncInput" spellcheck="false" placeholder="SHINX専用ポストから出力したNCコードを貼り付け"></textarea>
          <div id="ncList" class="nc-list"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
